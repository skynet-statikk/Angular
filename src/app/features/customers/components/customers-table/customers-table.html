<app-base-table
  [columns]="() => columns"
  [dataSource]="dataSource"
  [selection]="selection"
  [filterValue]="filterValue"
  [cellTemplate]="cellTemplate"
  (add)="addCustomer()"
  (edit)="editCustomer()"
  (delete)="deleteCustomers()"
  (rowClick)="viewCustomer($event)"
>
</app-base-table>

<ng-template #cellTemplate let-row let-column="column">
  <app-customer-cell [value]="row[column.key]"></app-customer-cell>
</ng-template>
