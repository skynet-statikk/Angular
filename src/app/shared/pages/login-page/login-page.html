<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Admin Dashboard</h2>
      <p>Sign in to your account</p>
    </div>

    <form class="login-form" (ngSubmit)="onLogin()" #loginForm="ngForm">
      <mat-form-field class="full-width" appearance="fill">
        <mat-label>Username</mat-label>
        <input matInput placeholder="Enter your username" [(ngModel)]="credentials.username" required name="username" />
        <mat-icon matPrefix>person</mat-icon>
      </mat-form-field>

      <mat-form-field class="full-width" appearance="fill">
        <mat-label>Password</mat-label>
        <input
          matInput
          type="password"
          placeholder="Enter your password"
          [(ngModel)]="credentials.password"
          required
          name="password"
        />
        <mat-icon matPrefix>lock</mat-icon>
      </mat-form-field>

      @if (loginError) {
      <div class="error-message">{{ loginError }}</div>
      }

      <button mat-raised-button color="primary" class="login-button" type="submit" [disabled]="isLoginLoading">
        @if (!isLoginLoading) {
        <span>Sign In</span>
        } @else {
        <mat-spinner diameter="20"></mat-spinner>
        }
      </button>
    </form>
  </div>
</div>
