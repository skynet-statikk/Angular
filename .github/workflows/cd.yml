name: cd

# Staged deployment pipeline:
#   dev  → automatic (no approval gate)
#   qa   → requires manual approval (environment gate)
#   prod → requires michaeltg17 approval (environment gate)
#
# GitHub Settings configuration required:
#   - Environments > qa:    enable "Required reviewers" → add michaeltg17
#   - Environments > prod:  enable "Required reviewers" → add michaeltg17
#   - Auto-approval disabled: QA and PROD require explicit reviewer approval

on:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
    branches: [main]

jobs:
  # ── DEV: automatic, no approval gate ──────────────────────────
  deploy-dev:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: dev
      url: https://dev.statikk.ddns.net
    runs-on: ubuntu-latest
    steps:
      - name: Trigger dev deployment
        run: |
          BODY='{"environment":"dev","image_tag":"${{ github.event.workflow_run.head_sha }}","commit_sha":"${{ github.event.workflow_run.head_sha }}","commit_message":"${{ github.event.workflow_run.head_commit.message }}"}'
          SIGNATURE=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $2}')
          curl -sf --connect-timeout 10 --max-time 60 \
            -u "deploy:${{ secrets.DEPLOY_PASSWORD }}" \
            -H "X-Hub-Signature-256: sha256=${SIGNATURE}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            https://deploy.statikk.ddns.net || echo "⚠ Deploy endpoint unreachable, skipping"
          exit 0

  # ── QA: requires manual approval via environment gate ─────────
  # GitHub Settings → Environments → qa → Required reviewers: michaeltg17
  deploy-qa:
    needs: deploy-dev
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: qa
      url: https://qa.statikk.ddns.net
    runs-on: ubuntu-latest
    steps:
      - name: Trigger qa deployment
        run: |
          BODY='{"environment":"qa","image_tag":"${{ github.event.workflow_run.head_sha }}","commit_sha":"${{ github.event.workflow_run.head_sha }}","commit_message":"${{ github.event.workflow_run.head_commit.message }}"}'
          SIGNATURE=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $2}')
          curl -sf --connect-timeout 10 --max-time 60 \
            -u "deploy:${{ secrets.DEPLOY_PASSWORD }}" \
            -H "X-Hub-Signature-256: sha256=${SIGNATURE}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            https://deploy.statikk.ddns.net || echo "⚠ Deploy endpoint unreachable, skipping"
          exit 0

  # ── PROD: requires michaeltg17 approval via environment gate ──
  # GitHub Settings → Environments → prod → Required reviewers: michaeltg17
  deploy-prod:
    needs: deploy-qa
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: prod
      url: https://app.statikk.ddns.net
    runs-on: ubuntu-latest
    steps:
      - name: Trigger prod deployment
        run: |
          BODY='{"environment":"prod","image_tag":"${{ github.event.workflow_run.head_sha }}","commit_sha":"${{ github.event.workflow_run.head_sha }}","commit_message":"${{ github.event.workflow_run.head_commit.message }}"}'
          SIGNATURE=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $2}')
          curl -sf --connect-timeout 10 --max-time 60 \
            -u "deploy:${{ secrets.DEPLOY_PASSWORD }}" \
            -H "X-Hub-Signature-256: sha256=${SIGNATURE}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            https://deploy.statikk.ddns.net || echo "⚠ Deploy endpoint unreachable, skipping"
          exit 0
