name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Stryker incremental results
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-incremental

      - name: Build CI Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: angular-ci:latest
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci
          file: Dockerfile.ci

      - name: Run CI pipeline in Docker
        run: docker compose -f docker-compose.ci.yml run --rm ci

      - name: Generate coverage badges
        uses: michaeltg17/coverage-badges-action@fix/node24-runtime
        with:
          branches: main

      - name: Validate production Docker image builds
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha,scope=production
          cache-to: type=gha,mode=max,scope=production

      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-reports
          path: |
            coverage/
            reports/
          retention-days: 30