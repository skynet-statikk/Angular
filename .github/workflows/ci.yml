name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Stryker incremental results
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-incremental

      - name: Build CI Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: angular-ci:latest
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci
          file: Dockerfile.ci

      - name: Run CI pipeline in Docker
        run: docker compose -f docker-compose.ci.yml run --rm ci
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Generate coverage badges
        uses: jpb06/coverage-badges-action@main
        with:
          branches: main

      - name: Validate Docker image builds
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha,scope=production
          cache-to: type=gha,mode=max,scope=production

      - name: Metadata for Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=production
          cache-to: type=gha,mode=max,scope=production

      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-reports
          path: |
            coverage/
            reports/
          retention-days: 30
